<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>سلة التسوق</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Tajawal', sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .product-img {
            width: 60px;
            border-radius: 10px;
        }

        .quantity-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .quantity-box button {
            width: 30px;
            height: 30px;

        }

        .btn-main {
            background-color: #ff7a00;
            color: #fff;
        }

        .btn-main:hover {
            background-color: #e96d00;
        }

        .breadcrumb {
            background: transparent;
        }

        .breadcrumb-item::after+.breadcrumb-item::before {
            content: " /";
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item mr-2 ">
                    <a href="#" class="text-muted text-decoration-none">الرئيسية</a> /
                </li>
                <li class="breadcrumb-item active text-primary">سلة التسوق</li>
            </ol>
        </nav>
    </div>

    <div class="container my-4">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card p-3">
                    <h5 class="mb-3">سلة التسوق</h5>
                    <div class="table-responsive">
                        <table class="table align-middle text-center">
                            <thead class="table-light">
                                <tr>
                                    <th>المنتج</th>
                                    <th>السعر</th>
                                    <th>الكمية</th>
                                    <th>الإجمالي</th>
                                    <th></th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr>
                                    <td class="d-flex align-items-center gap-2">
                                        <img src="kaema.jfif" class="product-img">
                                        <span> خيمة قابلة للطي</span>
                                    </td>
                                    <td>$40</td>
                                    <td>
                                        <div class="quantity-box">
                                            <button class="btn btn-outline-secondary btn-sm">-</button>
                                            <span>1</span>
                                            <button class="btn btn-outline-secondary btn-sm">+</button>
                                        </div>
                                    </td>
                                    <td>$40</td>
                                    <td><i class="bi bi-x text-danger"></i></td>
                                </tr>

                                <tr>
                                    <td class="d-flex align-items-center gap-2">
                                        <img src="weaa.jpg" class="product-img border-rud">
                                        <span>وعاء ماء وطعام</span>
                                    </td>
                                    <td>$50</td>
                                    <td>
                                        <div class="quantity-box">
                                            <button class="btn btn-outline-secondary btn-sm">-</button>
                                            <span>3</span>
                                            <button class="btn btn-outline-secondary btn-sm">+</button>
                                        </div>
                                    </td>
                                    <td>$150</td>
                                    <td><i class="bi bi-x text-danger"></i></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex flex-column flex-md-row justify-content-between gap-2 mt-3">
                        <button class="btn btn-outline-primary">
                            <i class="bi bi-arrow-right"></i> متابعة التسوق
                        </button>

                        <button class="btn btn-outline-secondary">
                            تحديث السلة
                        </button>
                    </div>

                </div>
            </div>

            <!-- Cart Summary -->
            <div class="col-lg-4">
                <div class="card p-3">

                    <h6 class="mb-3">إجمالي السلة</h6>

                    <div class="d-flex justify-content-between mb-2">
                        <span>المجموع الفرعي</span>
                        <span>$120</span>
                    </div>

                    <div class="d-flex justify-content-between mb-2">
                        <span>الشحن</span>
                        <span>مجاني</span>
                    </div>

                    <div class="d-flex justify-content-between mb-2">
                        <span>الخصم</span>
                        <span>$24</span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>الضريبة</span>
                        <span>$61</span>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between fw-bold mb-3">
                        <span>الإجمالي</span>
                        <span>$214.39</span>
                    </div>
                    <a href="checkout.html" class="text-muted text-decoration-none">
                        <button class="btn btn-main w-100">
                            إتمام الشراء <i class="bi bi-arrow-left"></i>
                        </button>
                    </a>
                </div>

                <div class="card p-3 mt-3">
                    <h6>كود الخصم</h6>
                    <input type="text" class="form-control my-2" placeholder="أدخل الكود">
                    <button class="btn btn-primary w-100">تطبيق الكود</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
